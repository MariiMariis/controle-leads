<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: headerConfig}"></div>
    <title th:text="${lead.id != null ? 'Editar Lead' : 'Novo Lead'}">Novo Lead</title>
</head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>
    <div class="main-container">
        <div class="mb-4">
            <h2 th:text="${lead.id != null ? 'Editar Lead' : 'Novo Lead'}"></h2>
            <a th:href="@{/leads}" class="text-decoration-none">&larr; Voltar para a lista</a>
        </div>

        <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${mensagemErro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header">
                Dados do Lead
            </div>
            <div class="card-body">
                <form th:action="@{/leads/salvar}" th:object="${lead}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" id="nome" th:field="*{nome}" class="form-control" th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''" placeholder="Digite o nome completo">
                            <div th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" placeholder="exemplo@email.com">
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback"></div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="text" id="telefone" th:field="*{telefone}" class="form-control" th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid' : ''" placeholder="(00) 00000-0000">
                            <div th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}" class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="status" class="form-label">Status</label>
                            <select id="status" th:field="*{status}" class="form-select" th:classappend="${#fields.hasErrors('status')} ? 'is-invalid' : ''">
                                <option value="" disabled selected>Selecione um status</option>
                                <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s.descricao}"></option>
                            </select>
                            <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="invalid-feedback"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea id="observacoes" th:field="*{observacoes}" class="form-control" rows="3" placeholder="Informações adicionais sobre o lead..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-custom px-4">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
