<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments :: headerConfig}"></div>
    <title>Erro Inesperado</title>
</head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>
    <div class="main-container">
        <div class="container text-center mt-5">
            <div class="mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-exclamation-triangle text-danger" viewBox="0 0 16 16">
                    <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.15.15 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.2.2 0 0 1-.054.06.1.1 0 0 1-.066.017H1.146a.1.1 0 0 1-.066-.017.2.2 0 0 1-.054-.06.18.18 0 0 1 .002-.183L7.884 2.073a.15.15 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767z"/>
                    <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
                </svg>
            </div>
            <h1 class="display-5 fw-bold" th:text="${erro}">Ops! Ocorreu um problema.</h1>
            <p class="lead text-muted mt-3" th:text="${mensagem}">O sistema encontrou uma dificuldade temporária.</p>
            <div class="mt-4">
                <a th:href="@{/leads}" class="btn btn-primary px-4 py-2">Voltar para o Início</a>
            </div>
            
            <!-- Detalhes omitidos do usuário para segurança, apenas exibidos de forma genérica -->
            <p class="mt-5 text-muted small">
                Código: <span th:text="${status}">500</span> <br/>
                Para suporte, informe este caminho: <span th:text="${caminho}"></span>
            </p>
        </div>
    </div>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
