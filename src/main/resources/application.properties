spring.application.name=controle-leads

spring.datasource.url=jdbc:h2:mem:leadsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Propriedades customizadas para simular as falhas
app.falhas.simular-lentidao=false
app.falhas.simular-erro-banco=false
app.falhas.delay-ms=5000
